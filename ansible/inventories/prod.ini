# Prod on-prem-sim inventory.
# Get the VM IP:  cd infra/live/prod/vm-onprem-sim && terragrunt output vm_public_ip
# SSH key via --private-key; image via -e app_image=<acr>/weather-api:<tag>
# (see dev.ini for details).
[weather]
REPLACE_WITH_VM_IP ansible_user=azureuser

[weather:vars]
app_port=8000
