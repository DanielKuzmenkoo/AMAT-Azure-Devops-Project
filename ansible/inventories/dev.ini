# Dev on-prem-sim inventory.
# 1. Get the VM IP:   cd infra/live/dev/vm-onprem-sim && terragrunt output vm_public_ip
# 2. Replace REPLACE_WITH_VM_IP below.
#
# SSH key: pass it on the command line (don't set ansible_ssh_private_key_file
# here — an inventory var would override the pipeline's --private-key flag):
#   ansible-playbook ... --private-key ~/.ssh/id_rsa
#
# Image: always pass the exact tag that was pushed to ACR (build once, promote;
# never deploy `latest`):
#   ansible-playbook ... -e app_image=<acr-login-server>/weather-api:<tag>
[weather]
REPLACE_WITH_VM_IP ansible_user=azureuser

[weather:vars]
app_port=8000
