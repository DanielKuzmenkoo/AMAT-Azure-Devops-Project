# Dev on-prem-sim inventory.
# 1. Get the VM IP:   cd infra/live/dev/vm-onprem-sim && terragrunt output vm_public_ip
# 2. Replace REPLACE_WITH_VM_IP below and set the correct SSH key path/user.
[weather]
REPLACE_WITH_VM_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[weather:vars]
# Image to run. Use the SAME tag that was pushed to ACR (build once, promote).
app_image=REPLACE_WITH_ACR_LOGIN_SERVER/weather-api:latest
app_port=8000
