# Staging on-prem-sim inventory.
# Get the VM IP:  cd infra/live/staging/vm-onprem-sim && terragrunt output vm_public_ip
[weather]
REPLACE_WITH_VM_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[weather:vars]
app_image=REPLACE_WITH_ACR_LOGIN_SERVER/weather-api:latest
app_port=8000
