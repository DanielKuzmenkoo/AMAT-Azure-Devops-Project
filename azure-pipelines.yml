# Azure DevOps pipeline for the Weather demo.
#
# Flow: validate -> build image once -> push to shared ACR -> deploy the SAME
# image to the selected environment, on the selected target (Azure Container
# Apps or a VM via Ansible).
#
# GitFlow defaults (when environmentName = auto):
#   develop    -> dev
#   release/*  -> staging
#   main       -> prod   (manual approval on the 'weather-prod' environment)
#   hotfix/*   -> prod   (urgent; same approval gate)
# Any environment can also be chosen manually when running the pipeline.

parameters:
  - name: deployTarget
    displayName: Deployment target
    type: string
    default: aca
    values:
      - aca # Azure Container Apps (cloud)
      - vm  # Azure VM + Docker via Ansible (on-prem simulation)
  - name: environmentName
    displayName: Environment (auto = derive from branch)
    type: string
    default: auto
    values:
      - auto
      - dev
      - staging
      - prod

trigger:
  branches:
    include:
      - main
      - develop
      - release/*
      - hotfix/*

pr:
  branches:
    include:
      - develop
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - name: pythonVersion
    value: '3.12'
  - name: workingDir
    value: app
  - name: imageRepository
    value: weather-api
  # --- Set these as pipeline variables; values come from Terragrunt outputs ---
  #   terragrunt output acr_name / acr_login_server  (in infra/live/shared/acr)
  - name: azureServiceConnection
    value: 'weather-azure' # Azure Resource Manager service connection name
  - name: acrName
    value: 'acrweatherd76d60' # ACR resource name
  - name: acrLoginServer
    value: 'acrweatherd76d60.azurecr.io'
  # NOTE: the environment image tag is NOT a pipeline-level variable. It is
  # computed at runtime per branch by the 'setTag' step in BuildPush and
  # consumed by the deploy stages as an output variable (see below). We never
  # deploy 'latest' to environments; the commit SHA is also always pushed.

stages:
  # ---------------------------------------------------------------------------
  - stage: Validate
    displayName: Lint, Test, Docker build
    jobs:
      - job: quality_gate
        displayName: Quality gate
        steps:
          - task: UsePythonVersion@0
            displayName: Use Python $(pythonVersion)
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: pip install -r requirements-dev.txt
            displayName: Install dependencies
            workingDirectory: $(workingDir)
          - script: ruff check src tests
            displayName: Lint (ruff)
            workingDirectory: $(workingDir)
          # Unit + integration are the build gate: they run on every PR and on
          # develop/release/main, so they protect the path to EVERY environment.
          # Split into two named steps so the layers are visible in the UI.
          - script: pytest -m unit -q
            displayName: Unit tests
            workingDirectory: $(workingDir)
          - script: pytest -m integration -q
            displayName: Integration tests
            workingDirectory: $(workingDir)
          # Validation-only build (never pushed). Uses the build id as a throwaway
          # local tag; the real environment tag is computed later in BuildPush.
          - script: docker build -t $(imageRepository):$(Build.BuildId) .
            displayName: Validate Docker build
            workingDirectory: $(workingDir)

  # ---------------------------------------------------------------------------
  # Build the image once and push it to the shared ACR, tagged with both a
  # branch-derived tag and the commit SHA. Skipped on PRs.
  #
  # Branch-based image tag (computed at runtime by the 'setTag' step):
  #   develop     -> develop.<BuildId>
  #   release/*   -> release-<suffix>      (e.g. release/v1.1.0 -> release-v1.1.0)
  #   main        -> prod-<VER>            (latest semver tag, MINOR bumped)
  #   hotfix/*    -> prod-<VER>            (latest semver tag, PATCH bumped)
  #   (fallback)  -> feature.<BuildId>     (feature branches don't trigger CI)
  #
  # For main/hotfix we also create and push an annotated git tag v<VER> to
  # GitHub, so releases are versioned in source control. The commit SHA tag is
  # always pushed too, giving every build an immutable reference.
  - stage: BuildPush
    displayName: Build and push image to ACR
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: build_push
        displayName: Build and push
        steps:
          # Need full history + tags so the version script can read the latest
          # semver tag and push a new one. persistCredentials lets us reuse the
          # checkout, but tag pushes use an explicit PAT (see below).
          - checkout: self
            fetchDepth: 0
            fetchTags: true
            persistCredentials: true

          # Compute the environment image tag from the branch and, for
          # main/hotfix, cut + push the next git tag. Emits 'imageTag' as an
          # output variable consumed by the deploy stages.
          - bash: |
              set -euo pipefail
              git fetch --tags --quiet || true

              BRANCH="$(Build.SourceBranch)"

              # Helper: latest reachable semver tag (vMAJOR.MINOR.PATCH), or
              # default 0.0.0 if none exists yet.
              latest_semver() {
                local t
                t=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)
                if [ -z "$t" ]; then echo "0.0.0"; else echo "${t#v}"; fi
              }

              VER=""
              if [ "$BRANCH" = "refs/heads/develop" ]; then
                TAG="develop.$(Build.BuildId)"
              elif [[ "$BRANCH" == refs/heads/release/* ]]; then
                SUFFIX="${BRANCH#refs/heads/release/}"
                TAG="release-${SUFFIX}"
              elif [ "$BRANCH" = "refs/heads/main" ] || [[ "$BRANCH" == refs/heads/hotfix/* ]]; then
                # Parse MAJOR.MINOR.PATCH from the latest semver tag.
                BASE=$(latest_semver)
                IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
                MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
                if [ "$BASE" = "0.0.0" ]; then
                  # No prior release tag exists: start the line at 1.0.0.
                  VER="1.0.0"
                elif [ "$BRANCH" = "refs/heads/main" ]; then
                  # main: bump MINOR, reset PATCH.
                  VER="${MAJOR}.$((MINOR + 1)).0"
                else
                  # hotfix/*: bump PATCH.
                  VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
                fi
                TAG="prod-${VER}"
              else
                # feature/* or anything else (won't normally reach here).
                TAG="feature.$(Build.BuildId)"
              fi

              echo "Branch:    $BRANCH"
              echo "Image tag: $TAG"

              # For production releases, create + push the annotated git tag.
              if [ -n "$VER" ]; then
                echo "Creating git tag v$VER"
                git config user.email "azuredevops@noreply"
                git config user.name "Azure Pipelines"
                git tag -a "v$VER" -m "Release v$VER (CI)"
                # Pushing a tag does NOT retrigger the pipeline (branch triggers).
                git push "https://x-access-token:$(GITHUB_PAT)@github.com/DanielKuzmenkoo/AMAT-Azure-Devops-Project.git" "v$VER"
              fi

              echo "##vso[task.setvariable variable=imageTag;isOutput=true]$TAG"
            name: setTag
            displayName: Compute image tag (and release git tag)

          - task: AzureCLI@2
            displayName: Build and push to ACR
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(workingDir)
              inlineScript: |
                set -euo pipefail
                # Docker login with a short-lived ACR token. `az acr login`
                # fails under workload-identity-federation service connections
                # (CONNECTIVITY_REFRESH_TOKEN_ERROR: federated logins have no
                # AAD refresh token), so exchange an ARM *access* token for an
                # ACR refresh token directly. Then build once, push both tags.
                AAD_TOKEN=$(az account get-access-token --query accessToken -o tsv)
                ACR_TOKEN=$(curl -sf -X POST "https://$(acrLoginServer)/oauth2/exchange" \
                  -d "grant_type=access_token&service=$(acrLoginServer)&access_token=${AAD_TOKEN}" \
                  | jq -r .refresh_token)
                printf '%s' "$ACR_TOKEN" | docker login $(acrLoginServer) \
                  --username 00000000-0000-0000-0000-000000000000 --password-stdin

                # $(setTag.imageTag): output var needs the step-name prefix even
                # within the same job.
                IMAGE=$(acrLoginServer)/$(imageRepository)
                docker build -t $IMAGE:$(setTag.imageTag) -t $IMAGE:$(Build.SourceVersion) .
                docker push $IMAGE:$(setTag.imageTag)
                docker push $IMAGE:$(Build.SourceVersion)

  # ---------------------------------------------------------------------------
  - stage: Deploy_Dev
    displayName: Deploy to dev
    dependsOn: BuildPush
    condition: |
      and(succeeded(),
          ne(variables['Build.Reason'], 'PullRequest'),
          or(eq('${{ parameters.environmentName }}', 'dev'),
             and(eq('${{ parameters.environmentName }}', 'auto'),
                 eq(variables['Build.SourceBranch'], 'refs/heads/develop'))))
    # Resolve the branch-derived tag computed in BuildPush so the deploy
    # templates' $(imageTag) points at the image we just pushed.
    variables:
      imageTag: $[ stageDependencies.BuildPush.build_push.outputs['setTag.imageTag'] ]
    jobs:
      - ${{ if eq(parameters.deployTarget, 'aca') }}:
          - template: .azure/deploy-aca.yml
            parameters:
              environment: dev
      - ${{ if eq(parameters.deployTarget, 'vm') }}:
          - template: .azure/deploy-vm.yml
            parameters:
              environment: dev

  # ---------------------------------------------------------------------------
  - stage: Deploy_Staging
    displayName: Deploy to staging
    dependsOn: BuildPush
    condition: |
      and(succeeded(),
          ne(variables['Build.Reason'], 'PullRequest'),
          or(eq('${{ parameters.environmentName }}', 'staging'),
             and(eq('${{ parameters.environmentName }}', 'auto'),
                 startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))))
    # Resolve the branch-derived tag computed in BuildPush so the deploy
    # templates' $(imageTag) points at the image we just pushed.
    variables:
      imageTag: $[ stageDependencies.BuildPush.build_push.outputs['setTag.imageTag'] ]
    jobs:
      - ${{ if eq(parameters.deployTarget, 'aca') }}:
          - template: .azure/deploy-aca.yml
            parameters:
              environment: staging
      - ${{ if eq(parameters.deployTarget, 'vm') }}:
          - template: .azure/deploy-vm.yml
            parameters:
              environment: staging

  # ---------------------------------------------------------------------------
  # End-to-end tests against the live staging app, after it's deployed. Only
  # runs on the staging path (release/* via auto, or environmentName=staging)
  # and only on ACA. The e2e suite reads BASE_URL and is skipped if unset, but
  # we resolve the staging URL here so it actually exercises the deployed app.
  - stage: E2E_Staging
    displayName: End-to-end tests (staging)
    dependsOn: Deploy_Staging
    condition: |
      and(succeeded(),
          ne(variables['Build.Reason'], 'PullRequest'),
          eq('${{ parameters.deployTarget }}', 'aca'),
          or(eq('${{ parameters.environmentName }}', 'staging'),
             and(eq('${{ parameters.environmentName }}', 'auto'),
                 startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))))
    # The job is always defined; the stage-level condition (which includes the
    # aca check) skips the whole stage for vm runs. We avoid a compile-time
    # ${{ if }} guard here because, with no vm branch, it would expand to a
    # zero-job stage (a YAML error) on vm runs.
    jobs:
      - job: e2e_staging
        displayName: E2E (staging)
        steps:
          - task: UsePythonVersion@0
            displayName: Use Python $(pythonVersion)
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: pip install -r requirements-dev.txt
            displayName: Install test deps
            workingDirectory: $(workingDir)
          - task: AzureCLI@2
            displayName: End-to-end tests (staging)
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(workingDir)
              inlineScript: |
                set -euo pipefail
                az extension add --name containerapp --upgrade --only-show-errors
                FQDN=$(az containerapp show --name ca-weather-staging --resource-group rg-weather-staging --query properties.configuration.ingress.fqdn -o tsv)
                export BASE_URL="https://${FQDN}"
                echo "Running e2e against ${BASE_URL}"
                pytest -m e2e -q

  # ---------------------------------------------------------------------------
  - stage: Deploy_Prod
    displayName: Deploy to production
    dependsOn: BuildPush
    condition: |
      and(succeeded(),
          ne(variables['Build.Reason'], 'PullRequest'),
          or(eq('${{ parameters.environmentName }}', 'prod'),
             and(eq('${{ parameters.environmentName }}', 'auto'),
                 or(eq(variables['Build.SourceBranch'], 'refs/heads/main'),
                    startsWith(variables['Build.SourceBranch'], 'refs/heads/hotfix/')))))
    # Resolve the branch-derived tag computed in BuildPush so the deploy
    # templates' $(imageTag) points at the image we just pushed.
    variables:
      imageTag: $[ stageDependencies.BuildPush.build_push.outputs['setTag.imageTag'] ]
    jobs:
      - ${{ if eq(parameters.deployTarget, 'aca') }}:
          - template: .azure/deploy-aca.yml
            parameters:
              environment: prod
      - ${{ if eq(parameters.deployTarget, 'vm') }}:
          - template: .azure/deploy-vm.yml
            parameters:
              environment: prod
