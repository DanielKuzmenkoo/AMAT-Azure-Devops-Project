# Azure DevOps pipeline for the Weather demo (FastAPI + Docker).
#
# GitFlow:
#   main       -> production-ready; deploy to prod after manual approval
#   develop    -> active integration; deploy to dev
#   release/*  -> release stabilization; validation only
#   hotfix/*   -> urgent fixes; validation only
#
# Every branch and PR runs the same quality gate: lint, tests, Docker build.
# Deployment stages are intentionally simple placeholders so the pipeline runs
# green without a cloud subscription; wire real steps to a service connection
# when one is available.

trigger:
  branches:
    include:
      - main
      - develop
      - release/*
      - hotfix/*

pr:
  branches:
    include:
      - develop
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'
  workingDir: app
  imageName: weather-api

stages:
  - stage: Validate
    displayName: Lint, Test, Docker build
    jobs:
      - job: quality_gate
        displayName: Quality gate
        steps:
          - task: UsePythonVersion@0
            displayName: Use Python $(pythonVersion)
            inputs:
              versionSpec: '$(pythonVersion)'

          - script: pip install -r requirements-dev.txt
            displayName: Install dependencies
            workingDirectory: $(workingDir)

          - script: ruff check src tests
            displayName: Lint (ruff)
            workingDirectory: $(workingDir)

          - script: pytest -q
            displayName: Run unit tests
            workingDirectory: $(workingDir)

          - script: docker build -t $(imageName):$(Build.BuildId) .
            displayName: Validate Docker build
            workingDirectory: $(workingDir)

  # Deploy to the dev environment on pushes to develop (not on PRs).
  - stage: Deploy_Dev
    displayName: Deploy to dev
    dependsOn: Validate
    condition: >-
      and(succeeded(),
          eq(variables['Build.SourceBranch'], 'refs/heads/develop'),
          ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: deploy_dev
        displayName: Deploy dev
        environment: weather-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying $(imageName) to the dev environment..."
                  displayName: Deploy (placeholder)

  # Deploy to production on pushes to main. The 'weather-prod' environment
  # should have a manual approval check configured in Azure DevOps.
  - stage: Deploy_Prod
    displayName: Deploy to production
    dependsOn: Validate
    condition: >-
      and(succeeded(),
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: deploy_prod
        displayName: Deploy production
        environment: weather-prod
        strategy:
          runOnce:
            deploy:
              steps:
                # Placeholders: with a real service connection these become a
                # `docker push` to a registry (e.g. ACR) and a deploy step.
                - script: echo "Pushing $(imageName):$(Build.BuildId) to the container registry..."
                  displayName: Push production image (placeholder)
                - script: echo "Deploying $(imageName) to production..."
                  displayName: Deploy (placeholder)
