# Reusable deployment job: run the same image on the environment's VM using
# Ansible (on-prem simulation). The SSH private key comes from an Azure DevOps
# secure file; the ACR pull uses a short-lived token (no stored registry password).
#
# Prerequisite: ansible/inventories/<env>.ini must contain the VM's public IP
# (from `terragrunt output vm_public_ip`). Keep secrets out of the repo.
#
# Only `environment` is a parameter; the rest are pipeline-root variables.
parameters:
  - name: environment
    type: string

jobs:
  - deployment: deploy_vm_${{ parameters.environment }}
    displayName: VM/Ansible deploy (${{ parameters.environment }})
    environment: weather-${{ parameters.environment }}
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
            - task: DownloadSecureFile@1
              name: vmKey
              displayName: Download VM SSH private key
              inputs:
                secureFile: weather-vm-${{ parameters.environment }}.pem
            - script: |
                set -euo pipefail
                python3 -m pip install --user ansible
                export PATH="$HOME/.local/bin:$PATH"
                ansible-galaxy collection install -r ansible/requirements.yml
              displayName: Install Ansible
            - task: AzureCLI@2
              displayName: Run Ansible playbook
              inputs:
                azureSubscription: $(azureServiceConnection)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  export PATH="$HOME/.local/bin:$PATH"
                  # Short-lived ACR token so no registry password is stored anywhere.
                  # Exchange an ARM access token directly: `az acr login` (even with
                  # --expose-token) fails under workload-identity-federation logins
                  # with CONNECTIVITY_REFRESH_TOKEN_ERROR.
                  AAD_TOKEN=$(az account get-access-token --query accessToken -o tsv)
                  ACR_TOKEN=$(curl -sf -X POST "https://$(acrLoginServer)/oauth2/exchange" \
                    -d "grant_type=access_token&service=$(acrLoginServer)&access_token=${AAD_TOKEN}" \
                    | jq -r .refresh_token)
                  ansible-playbook \
                    -i ansible/inventories/${{ parameters.environment }}.ini \
                    ansible/playbooks/deploy-weather-app.yml \
                    --private-key "$(vmKey.secureFilePath)" \
                    -e ansible_ssh_common_args='-o StrictHostKeyChecking=no' \
                    -e app_image=$(acrLoginServer)/$(imageRepository):$(imageTag) \
                    -e acr_login_server=$(acrLoginServer) \
                    -e acr_username=00000000-0000-0000-0000-000000000000 \
                    -e acr_password="$ACR_TOKEN"
