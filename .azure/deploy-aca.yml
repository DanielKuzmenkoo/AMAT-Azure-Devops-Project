# Reusable deployment job: update an environment's Azure Container App to the
# image tag built earlier in the pipeline (build once, promote the same image).
#
# Only `environment` is a parameter (needed at compile time for the environment
# resource). ACR/image/service-connection values are pipeline-root variables,
# which are global and resolved at runtime inside the script.
parameters:
  - name: environment
    type: string

jobs:
  - deployment: deploy_aca_${{ parameters.environment }}
    displayName: ACA deploy (${{ parameters.environment }})
    # Approvals/checks (e.g. prod manual approval) are configured on this
    # environment in the Azure DevOps UI.
    environment: weather-${{ parameters.environment }}
    strategy:
      runOnce:
        deploy:
          steps:
            - task: AzureCLI@2
              displayName: Update Container App image
              inputs:
                azureSubscription: $(azureServiceConnection)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  # Hosted agents don't ship the containerapp extension, and the
                  # dynamic-install prompt would abort a non-interactive run.
                  az extension add --name containerapp --upgrade --only-show-errors

                  # Preflight: this stage only promotes an image onto existing
                  # infra. Bail out with a clear message if the Container App
                  # (or its resource group) hasn't been provisioned yet.
                  if ! az containerapp show \
                    --name ca-weather-${{ parameters.environment }} \
                    --resource-group rg-weather-${{ parameters.environment }} \
                    -o none 2>/dev/null; then
                    echo "ERROR: Container App 'ca-weather-${{ parameters.environment }}' was not found in resource group 'rg-weather-${{ parameters.environment }}'." >&2
                    echo "" >&2
                    echo "This deploy stage only promotes an image to existing infrastructure; it does not create it." >&2
                    echo "Provision the infra first (Container App, resource group, shared CAE) by running:" >&2
                    echo "" >&2
                    echo "    scripts/bootstrap-infra.sh ${{ parameters.environment }}" >&2
                    echo "" >&2
                    echo "then re-run this pipeline." >&2
                    exit 1
                  fi

                  # Promote the image. Let any failure surface the real Azure
                  # error (no --output none) so diagnostics reach the log.
                  az containerapp update \
                    --name ca-weather-${{ parameters.environment }} \
                    --resource-group rg-weather-${{ parameters.environment }} \
                    --image $(acrLoginServer)/$(imageRepository):$(imageTag)

                  # Surface the deployed URL (same value as Terraform's app_url
                  # output) and smoke-test the health endpoint.
                  FQDN=$(az containerapp show \
                    --name ca-weather-${{ parameters.environment }} \
                    --resource-group rg-weather-${{ parameters.environment }} \
                    --query properties.configuration.ingress.fqdn -o tsv)
                  APP_URL="https://${FQDN}"

                  echo "Waiting for the new revision to answer /api/health ..."
                  for i in $(seq 1 10); do
                    if curl -sf --max-time 5 "${APP_URL}/api/health" >/dev/null; then break; fi
                    sleep 5
                  done
                  HEALTH=$(curl -sf --max-time 5 "${APP_URL}/api/health")

                  echo "=================================================="
                  echo "  Deployed: $(imageRepository):$(imageTag)"
                  echo "  App URL : ${APP_URL}"
                  echo "  Health  : ${HEALTH}"
                  echo "=================================================="

                  # Publish to the pipeline run's Summary tab.
                  SUMMARY="$(System.DefaultWorkingDirectory)/deploy-summary.md"
                  {
                    echo "## 🌦️ Weather app — ${{ parameters.environment }}"
                    echo ""
                    echo "| | |"
                    echo "|---|---|"
                    echo "| **App URL** | [${APP_URL}](${APP_URL}) |"
                    echo "| **Image** | \`$(imageRepository):$(imageTag)\` |"
                    echo "| **Commit** | \`$(Build.SourceVersion)\` |"
                    echo "| **Health** | \`${HEALTH}\` |"
                  } > "$SUMMARY"
                  echo "##vso[task.uploadsummary]$SUMMARY"
