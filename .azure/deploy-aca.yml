# Reusable deployment job: update an environment's Azure Container App to the
# image tag built earlier in the pipeline (build once, promote the same image).
#
# Only `environment` is a parameter (needed at compile time for the environment
# resource). ACR/image/service-connection values are pipeline-root variables,
# which are global and resolved at runtime inside the script.
parameters:
  - name: environment
    type: string

jobs:
  - deployment: deploy_aca_${{ parameters.environment }}
    displayName: ACA deploy (${{ parameters.environment }})
    # Approvals/checks (e.g. prod manual approval) are configured on this
    # environment in the Azure DevOps UI.
    environment: weather-${{ parameters.environment }}
    strategy:
      runOnce:
        deploy:
          steps:
            - task: AzureCLI@2
              displayName: Update Container App image
              inputs:
                azureSubscription: $(azureServiceConnection)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  az containerapp update \
                    --name ca-weather-${{ parameters.environment }} \
                    --resource-group rg-weather-${{ parameters.environment }} \
                    --image $(acrLoginServer)/$(imageRepository):$(imageTag)
